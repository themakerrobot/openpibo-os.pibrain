<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="shortcut icon" href="/static/icon.png" type="image/x-icon"/>
  <link rel="stylesheet" href="/static/all.min.css"/>
  <title>Tools for PiBrain</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Noto Sans KR", -apple-system, sans-serif; background: #f0fafa; display: flex; flex-direction: column; min-height: 100vh; }

    header { background: #f9c300; padding: 0 20px; height: 48px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 6px rgba(0,0,0,0.1); flex-shrink: 0; }
    header h1 { font-size: 18px; font-weight: 800; color: #1a1a1a; }

    nav { background: #fff; border-bottom: 2px solid #f9c300; display: flex; gap: 2px; padding: 0 16px; overflow-x: auto; }
    nav button { padding: 12px 20px; border: none; background: none; font-size: 14px; font-weight: 700; color: #999; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: color 0.15s; }
    nav button.active { color: #1a1a1a; border-bottom-color: #f9c300; }
    nav button:hover:not(.active) { color: #555; }

    .tab { display: none; padding: 20px; max-width: 860px; width: 100%; margin: 0 auto; }
    .tab.active { display: block; }

    .card { background: #fff; border-radius: 14px; padding: 18px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 14px; }
    .card-title { font-size: 13px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; }

    .btn { padding: 10px 18px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-yellow { background: #f9c300; color: #1a1a1a; }
    .btn-gray   { background: #eee; color: #555; }
    .btn-teal   { background: #13bfd5; color: #fff; }
    .btn-red    { background: #f44336; color: #fff; }
    .btn-sm     { padding: 7px 12px; font-size: 13px; }

    /* 버튼 탭 */
    .button-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 14px; }
    .bi { border-radius: 14px; padding: 20px 10px; text-align: center; background: #f5f5f5; border: 2px solid #ddd; transition: all 0.2s; }
    .bi.on { background: #fffde7; border-color: #f9c300; box-shadow: 0 0 0 3px rgba(249,195,0,0.2); }
    .bi .num { font-size: 28px; font-weight: 900; color: #ccc; }
    .bi.on .num { color: #f9c300; }
    .bi .lbl { font-size: 12px; color: #bbb; margin-top: 4px; }
    .bi.on .lbl { color: #888; }
    .log-box { background: #f8f8f8; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #555; min-height: 60px; max-height: 120px; overflow-y: auto; }

    /* LED 탭 */
    .led-preview { width: 80px; height: 80px; border-radius: 50%; background: #111; margin: 0 auto 20px; border: 3px solid #eee; transition: background 0.2s, box-shadow 0.3s; }
    .led-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .led-row label { font-size: 13px; font-weight: 700; width: 16px; }
    .led-row label.r { color: #f44336; }
    .led-row label.g { color: #4caf50; }
    .led-row label.b { color: #2196f3; }
    .led-row input[type=range] { flex: 1; accent-color: #f9c300; }
    .led-row input[type=number] { width: 60px; padding: 6px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; text-align: center; }
    .color-picker { width: 48px; height: 36px; border: none; border-radius: 8px; cursor: pointer; padding: 2px; }
    .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

    /* 카메라/비전 탭 */
    #cam-wrap { position: relative; width: 100%; border-radius: 14px; overflow: hidden; background: #111; min-height: 220px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
    #cam-img { width: 100%; display: block; }
    .cam-ph { color: #666; font-size: 14px; }
    .vision-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
    @media (max-width: 560px) { .vision-grid { grid-template-columns: repeat(3, 1fr); } }
    .vbtn { padding: 10px 4px; border: 2px solid #eee; border-radius: 10px; background: #fff; font-size: 12px; font-weight: 700; color: #888; cursor: pointer; text-align: center; transition: all 0.15s; }
    .vbtn:hover { border-color: #f9c300; color: #555; }
    .vbtn.active { border-color: #f9c300; background: #fffde7; color: #1a1a1a; }
    .result-box { background: #f8f8f8; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #444; min-height: 36px; word-break: break-all; }
    .marker-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #666; margin-bottom: 10px; }
    .marker-row input { width: 70px; padding: 6px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 13px; text-align: center; }

    /* TTS 탭 */
    .form-label { font-size: 13px; font-weight: 700; color: #555; margin-bottom: 6px; display: block; }
    .form-group { margin-bottom: 14px; }
    .form-group textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 80px; }
    .voice-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .voice-btn { padding: 10px 4px; border: 2px solid #eee; border-radius: 10px; background: #fff; font-size: 12px; font-weight: 700; color: #888; cursor: pointer; text-align: center; transition: all 0.15s; }
    .voice-btn:hover { border-color: #f9c300; }
    .voice-btn.active { border-color: #f9c300; background: #fffde7; color: #1a1a1a; }

    /* LCD 탭 */
    .lcd-preview {
      width: 100%; max-width: 240px; height: 320px; border-radius: 10px;
      border: 3px solid #333; margin: 0 auto 16px; display: flex;
      align-items: flex-start; justify-content: flex-start;
      overflow: hidden; position: relative; font-size: 14px;
    }
    .lcd-preview canvas { width: 100%; height: 100%; }
    .row2 { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; }
    .row2 label { font-size: 13px; font-weight: 700; color: #555; min-width: 60px; }
    .row2 input[type=number] { width: 72px; padding: 6px 8px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; text-align: center; }
    .row2 input[type=color] { width: 48px; height: 34px; border: none; border-radius: 8px; cursor: pointer; padding: 2px; }
    .oled-status { background: #f8f8f8; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #444; min-height: 32px; }
  </style>
</head>
<body>
<header>
  <h1>🛠 Tools for PiBrain</h1>
</header>

<nav>
  <button class="active" onclick="switchTab('buttons',this)">🎮 버튼</button>
  <button onclick="switchTab('led',this)">💡 LED</button>
  <button onclick="switchTab('camera',this)">📷 카메라 / 비전</button>
  <button onclick="switchTab('tts',this)">🔊 음성합성</button>
  <button onclick="switchTab('lcd',this)">📺 LCD</button>
</nav>

<!-- 버튼 탭 -->
<div class="tab active" id="tab-buttons">
  <div class="card">
    <div class="card-title">버튼 상태 (실시간)</div>
    <div class="button-grid">
      <div class="bi" id="bi-1"><div class="num">1</div><div class="lbl">OFF</div></div>
      <div class="bi" id="bi-2"><div class="num">2</div><div class="lbl">OFF</div></div>
      <div class="bi" id="bi-3"><div class="num">3</div><div class="lbl">OFF</div></div>
      <div class="bi" id="bi-4"><div class="num">4</div><div class="lbl">OFF</div></div>
    </div>
    <div class="log-box" id="btn-log">이벤트 대기 중...</div>
  </div>
</div>

<!-- LED 탭 -->
<div class="tab" id="tab-led">
  <div class="card">
    <div class="led-preview" id="led-preview"></div>
    <div class="led-row">
      <label class="r">R</label>
      <input type="range" id="r-range" min="0" max="255" value="0" oninput="syncLed('r',this.value)"/>
      <input type="number" id="r-num" min="0" max="255" value="0" oninput="syncLed('r',this.value)"/>
    </div>
    <div class="led-row">
      <label class="g">G</label>
      <input type="range" id="g-range" min="0" max="255" value="0" oninput="syncLed('g',this.value)"/>
      <input type="number" id="g-num" min="0" max="255" value="0" oninput="syncLed('g',this.value)"/>
    </div>
    <div class="led-row">
      <label class="b">B</label>
      <input type="range" id="b-range" min="0" max="255" value="0" oninput="syncLed('b',this.value)"/>
      <input type="number" id="b-num" min="0" max="255" value="0" oninput="syncLed('b',this.value)"/>
    </div>
    <div class="led-row" style="margin-top:14px">
      <label style="color:#555;width:auto;margin-right:4px">컬러픽커</label>
      <input type="color" class="color-picker" id="led-picker" value="#000000" oninput="applyColorPicker(this.value)"/>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
      <button class="btn btn-yellow" onclick="applyLed()">✓ 적용</button>
      <button class="btn btn-gray" onclick="ledOff()">✕ 끄기</button>
    </div>
    <div class="presets">
      <button class="btn btn-sm" style="background:#f44336;color:#fff" onclick="setPreset(255,0,0)">빨강</button>
      <button class="btn btn-sm" style="background:#4caf50;color:#fff" onclick="setPreset(0,255,0)">초록</button>
      <button class="btn btn-sm" style="background:#2196f3;color:#fff" onclick="setPreset(0,0,255)">파랑</button>
      <button class="btn btn-sm" style="background:#ff9800;color:#fff" onclick="setPreset(255,140,0)">주황</button>
      <button class="btn btn-sm" style="background:#9c27b0;color:#fff" onclick="setPreset(160,0,200)">보라</button>
      <button class="btn btn-sm" style="background:#fff;color:#333;border:1px solid #ddd" onclick="setPreset(255,255,255)">흰색</button>
    </div>
  </div>
</div>

<!-- 카메라/비전 탭 -->
<div class="tab" id="tab-camera">
  <div class="card">
    <div id="cam-wrap" style="display:none;margin-bottom:14px">
      <img id="cam-img" style="width:100%;border-radius:10px;display:block" alt="camera"/>
    </div>
    <div id="cam-ph" style="color:#888;font-size:14px;margin-bottom:14px">카메라를 켜면 기기 LCD에 표시됩니다</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-yellow" id="btn-cam" onclick="toggleCamera()">📷 카메라 켜기</button>
      <button class="btn btn-teal btn-sm" id="btn-capture" onclick="captureToWeb()" disabled>🖼 웹에 표시</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">비전 기능</div>
    <div class="vision-grid">
      <button class="vbtn active" onclick="setVision('camera',this)">📷<br>카메라</button>
      <button class="vbtn" onclick="setVision('grayscale',this)">🌑<br>흑백</button>
      <button class="vbtn" onclick="setVision('canny',this)">✏️<br>엣지</button>
      <button class="vbtn" onclick="setVision('edgePreservingFilter',this)">🌊<br>엣지보존</button>
      <button class="vbtn" onclick="setVision('cartoon',this)">🎨<br>카툰</button>
      <button class="vbtn" onclick="setVision('sketch_rgb',this)">🖊<br>스케치</button>
      <button class="vbtn" onclick="setVision('detail',this)">🔍<br>디테일</button>
      <button class="vbtn" onclick="setVision('qr',this)">📱<br>QR코드</button>
      <button class="vbtn" onclick="setVision('face',this)">😊<br>얼굴인식</button>
      <button class="vbtn" onclick="setVision('face_landmark',this)">🗺<br>랜드마크</button>
      <button class="vbtn" onclick="setVision('object',this)">📦<br>객체인식</button>
      <button class="vbtn" onclick="setVision('hand',this)">✋<br>손인식</button>
      <button class="vbtn" onclick="setVision('pose',this)">🕺<br>포즈</button>
      <button class="vbtn" onclick="setVision('marker',this)">📌<br>마커</button>
    </div>
    <div class="marker-row" id="marker-row" style="display:none">
      <label>마커 길이</label>
      <input type="number" id="marker-len" value="5" min="1" max="50" step="0.1"/>
      <span>cm</span>
      <button class="btn btn-sm btn-gray" onclick="updateMarkerLen()">적용</button>
    </div>
    <div class="result-box" id="vision-result">결과가 여기에 표시됩니다</div>
  </div>
</div>

<!-- TTS 탭 -->
<div class="tab" id="tab-tts">
  <div class="card">
    <div class="card-title">목소리 선택</div>
    <div class="voice-grid">
      <button class="voice-btn active" onclick="setVoice('f1',this)">👩 f1</button>
      <button class="voice-btn" onclick="setVoice('f2',this)">👩 f2</button>
      <button class="voice-btn" onclick="setVoice('f3',this)">👩 f3</button>
      <button class="voice-btn" onclick="setVoice('f4',this)">👩 f4</button>
      <button class="voice-btn" onclick="setVoice('f5',this)">👩 f5</button>
      <button class="voice-btn" onclick="setVoice('m1',this)">👨 m1</button>
      <button class="voice-btn" onclick="setVoice('m2',this)">👨 m2</button>
      <button class="voice-btn" onclick="setVoice('m3',this)">👨 m3</button>
      <button class="voice-btn" onclick="setVoice('m4',this)">👨 m4</button>
      <button class="voice-btn" onclick="setVoice('m5',this)">👨 m5</button>
    </div>
  </div>
  <div class="card">
    <div class="form-group">
      <label class="form-label">말할 내용</label>
      <textarea id="tts-text" placeholder="여기에 말할 내용을 입력하세요...">안녕하세요! 저는 파이브레인입니다.</textarea>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:14px">
      <button class="btn btn-yellow" id="tts-btn" onclick="speakTTS()" style="flex:1">▶ 말하기</button>
      <button class="btn btn-gray" onclick="stopTTS()">■ 정지</button>
    </div>
    <div class="result-box" id="tts-status">대기 중...</div>
  </div>
</div>

<!-- LCD 탭 -->
<div class="tab" id="tab-lcd">
  <!-- 미리보기 (240×320 비율 캔버스) -->
  <div class="card">
    <div class="card-title">LCD 미리보기 (240×320)</div>
    <div class="lcd-preview">
      <canvas id="lcd-canvas" width="240" height="320"></canvas>
    </div>
  </div>

  <!-- 텍스트 설정 -->
  <div class="card">
    <div class="card-title">텍스트 출력</div>

    <div class="form-group">
      <label class="form-label">출력할 텍스트 (줄바꿈 지원)</label>
      <textarea id="lcd-text" placeholder="여기에 출력할 내용을 입력하세요..." style="min-height:80px;width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;">안녕하세요!\n파이브레인입니다.</textarea>
    </div>

    <div class="row2">
      <label>폰트 크기</label>
      <input type="number" id="lcd-size" value="24" min="8" max="80" step="2" oninput="updateLcdPreview()"/>
    </div>
    <div class="row2">
      <label>X 위치</label>
      <input type="number" id="lcd-x" value="10" min="0" max="230" oninput="updateLcdPreview()"/>
      <label style="margin-left:8px">Y 위치</label>
      <input type="number" id="lcd-y" value="10" min="0" max="310" oninput="updateLcdPreview()"/>
    </div>
    <div class="row2">
      <label>글자색</label>
      <input type="color" id="lcd-fg" value="#ffffff" oninput="updateLcdPreview()"/>
      <label style="margin-left:8px">배경색</label>
      <input type="color" id="lcd-bg" value="#000000" oninput="updateLcdPreview()"/>
    </div>

    <div style="display:flex;gap:10px;margin-top:6px;flex-wrap:wrap">
      <button class="btn btn-yellow" onclick="sendLcdText()" style="flex:1">📤 LCD에 출력</button>
      <button class="btn btn-gray" onclick="clearLcd()">🗑 화면 지우기</button>
    </div>
    <div class="oled-status" id="lcd-status" style="margin-top:12px">대기 중...</div>
  </div>

  <!-- 초기화 -->
  <div class="card">
    <div class="card-title">시스템</div>
    <p style="font-size:13px;color:#666;margin-bottom:12px">
      network_disp.py를 재시작합니다.<br>카메라가 꺼진 상태에서만 동작합니다.
    </p>
    <button class="btn btn-red btn-sm" onclick="resetOled()">🔄 LCD 초기화 (network_disp 재시작)</button>
    <div class="oled-status" id="oled-reset-status" style="margin-top:10px">대기 중...</div>
  </div>
</div>

<script>
  // ── 탭 전환 ──────────────────────────────────────────────────
  let btnSrc = null;

  function switchTab(name, btn) {
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'buttons' && !btnSrc) startButtonStream();
    if (name === 'camera') resetVision();
    if (name === 'lcd') updateLcdPreview();
  }

  function resetVision() {
    currentVision = 'camera';
    fetch('/vision_type?t=camera');
    document.querySelectorAll('.vbtn').forEach(b => b.classList.remove('active'));
    document.querySelector('.vbtn').classList.add('active');
    clearInterval(resultInterval);
    document.getElementById('vision-result').textContent = '결과가 여기에 표시됩니다';
    document.getElementById('marker-row').style.display = 'none';
  }

  // ── 버튼 SSE ─────────────────────────────────────────────────
  function startButtonStream() {
    btnSrc = new EventSource('/button_stream');
    btnSrc.onmessage = e => {
      const state = JSON.parse(e.data);
      for (const [k, v] of Object.entries(state)) {
        const el = document.getElementById('bi-' + k);
        const on = v === 'on';
        el.classList.toggle('on', on);
        el.querySelector('.lbl').textContent = on ? 'ON' : 'OFF';
        if (on) {
          const t = new Date().toLocaleTimeString();
          const log = document.getElementById('btn-log');
          log.innerHTML = `<span style="color:#f9c300">${t}</span> 버튼 ${k} 눌림<br>` + log.innerHTML;
        }
      }
    };
  }
  startButtonStream();

  // ── LED ──────────────────────────────────────────────────────
  let R=0, G=0, B=0;
  function syncLed(ch, val) {
    val = Math.max(0, Math.min(255, parseInt(val)||0));
    if(ch==='r') R=val; else if(ch==='g') G=val; else B=val;
    document.getElementById(`${ch}-range`).value = val;
    document.getElementById(`${ch}-num`).value = val;
    const el = document.getElementById('led-preview');
    el.style.background = `rgb(${R},${G},${B})`;
    el.style.boxShadow = R+G+B>0 ? `0 0 24px rgba(${R},${G},${B},0.5)` : 'none';
    document.getElementById('led-picker').value = '#'+[R,G,B].map(v=>v.toString(16).padStart(2,'0')).join('');
  }
  function applyColorPicker(hex) {
    syncLed('r',parseInt(hex.slice(1,3),16));
    syncLed('g',parseInt(hex.slice(3,5),16));
    syncLed('b',parseInt(hex.slice(5,7),16));
  }
  function applyLed() { fetch(`/led?r=${R}&g=${G}&b=${B}`); }
  function ledOff() { syncLed('r',0); syncLed('g',0); syncLed('b',0); fetch('/led_off'); }
  function setPreset(r,g,b) { syncLed('r',r); syncLed('g',g); syncLed('b',b); applyLed(); }

  // ── 카메라 ───────────────────────────────────────────────────
  let camOn=false, resultInterval=null;

  function toggleCamera() {
    if (camOn) {
      fetch('/camera?d=off');
      camOn=false;
      clearInterval(resultInterval);
      document.getElementById('btn-cam').textContent='📷 카메라 켜기';
      document.getElementById('btn-capture').disabled=true;
      document.getElementById('cam-ph').textContent='카메라를 켜면 기기 LCD에 표시됩니다';
      document.getElementById('cam-wrap').style.display='none';
    } else {
      fetch('/camera?d=on');
      camOn=true;
      document.getElementById('btn-cam').textContent='📷 카메라 끄기';
      document.getElementById('btn-capture').disabled=false;
      document.getElementById('cam-ph').textContent='기기 LCD에 스트리밍 중...';
    }
  }

  async function captureToWeb() {
    const res = await fetch('/capture_frame').then(r=>r.json());
    if (res.frame) {
      document.getElementById('cam-img').src = 'data:image/jpeg;base64,' + res.frame;
      document.getElementById('cam-wrap').style.display='block';
    }
  }

  // ── 비전 ─────────────────────────────────────────────────────
  let currentVision='camera';
  function setVision(type, btn) {
    currentVision=type;
    document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const ml=document.getElementById('marker-len').value||5;
    document.getElementById('marker-row').style.display=type==='marker'?'flex':'none';
    fetch(`/vision_type?t=${type}&ml=${ml}`);
    clearInterval(resultInterval);
    const noResult=['camera','grayscale','canny','edgePreservingFilter','cartoon','sketch_rgb','detail','pose'];
    if (!noResult.includes(type)) {
      resultInterval=setInterval(()=>{
        fetch('/vision_result').then(r=>r.json()).then(d=>{
          document.getElementById('vision-result').textContent=d.result||'인식 결과 없음';
        });
      },500);
    } else {
      document.getElementById('vision-result').textContent='결과가 여기에 표시됩니다';
    }
  }
  function updateMarkerLen() {
    fetch(`/vision_type?t=marker&ml=${document.getElementById('marker-len').value}`);
  }

  // ── TTS ──────────────────────────────────────────────────────
  let selectedVoice='f1';
  function setVoice(v,btn) {
    selectedVoice=v;
    document.querySelectorAll('.voice-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
  async function speakTTS() {
    const text=document.getElementById('tts-text').value.trim();
    if(!text) return;
    document.getElementById('tts-btn').disabled=true;
    document.getElementById('tts-status').textContent='말하는 중...';
    const res=await fetch(`/tts?text=${encodeURIComponent(text)}&voice=${selectedVoice}`).then(r=>r.json());
    document.getElementById('tts-status').textContent=res.ok?'완료 ✓':`오류: ${res.error||''}`;
    document.getElementById('tts-btn').disabled=false;
  }
  function stopTTS() { fetch('/tts_stop'); document.getElementById('tts-status').textContent='정지됨'; }

  // ── LCD ──────────────────────────────────────────────────────
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return {r, g, b};
  }

  function updateLcdPreview() {
    const canvas = document.getElementById('lcd-canvas');
    const ctx = canvas.getContext('2d');
    const text = document.getElementById('lcd-text').value;
    const size = parseInt(document.getElementById('lcd-size').value) || 24;
    const x = parseInt(document.getElementById('lcd-x').value) || 0;
    const y = parseInt(document.getElementById('lcd-y').value) || 0;
    const fg = document.getElementById('lcd-fg').value;
    const bg = document.getElementById('lcd-bg').value;

    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, 240, 320);

    ctx.fillStyle = fg;
    ctx.font = `${size}px "Noto Sans KR", sans-serif`;
    ctx.textBaseline = 'top';

    const lines = text.split(/\\n|\n/);
    lines.forEach((line, i) => {
      ctx.fillText(line, x, y + i * (size + 4));
    });
  }

  async function sendLcdText() {
    const text = document.getElementById('lcd-text').value;
    const size = parseInt(document.getElementById('lcd-size').value) || 24;
    const x    = parseInt(document.getElementById('lcd-x').value) || 0;
    const y    = parseInt(document.getElementById('lcd-y').value) || 0;
    const fg   = hexToRgb(document.getElementById('lcd-fg').value);
    const bg   = hexToRgb(document.getElementById('lcd-bg').value);

    document.getElementById('lcd-status').textContent = '전송 중...';

    // \n을 실제 줄바꿈으로 변환 후 서버에 전달 (서버는 \n으로 split)
    const encodedText = encodeURIComponent(text.replace(/\\n/g, '\n'));
    const url = `/oled_text?text=${encodedText}&x=${x}&y=${y}&size=${size}` +
                `&r=${fg.r}&g=${fg.g}&b=${fg.b}&bg_r=${bg.r}&bg_g=${bg.g}&bg_b=${bg.b}`;
    const res = await fetch(url).then(r=>r.json());
    document.getElementById('lcd-status').textContent = res.ok ? '출력 완료 ✓' : `오류: ${res.error||''}`;
  }

  async function clearLcd() {
    const bg = hexToRgb(document.getElementById('lcd-bg').value);
    document.getElementById('lcd-status').textContent = '지우는 중...';
    const res = await fetch(`/oled_clear?bg_r=${bg.r}&bg_g=${bg.g}&bg_b=${bg.b}`).then(r=>r.json());
    document.getElementById('lcd-status').textContent = res.ok ? '화면 지워짐 ✓' : `오류: ${res.error||''}`;
    updateLcdPreview(); // 캔버스도 초기화
  }

  async function resetOled() {
    document.getElementById('oled-reset-status').textContent = 'network_disp 시작 중...';
    const res = await fetch('/oled_reset').then(r=>r.json());
    document.getElementById('oled-reset-status').textContent =
      res.ok ? 'network_disp 시작됨 ✓' : `오류: ${res.error||''}`;
  }

  window.addEventListener('beforeunload',()=>{
    fetch('/camera?d=off',{keepalive:true});
    fetch('/led_off',{keepalive:true});
    fetch(`http://${location.hostname}/tools?enable=off`, { keepalive: true}).catch(() => {});
  });
</script>
</body>
</html>
