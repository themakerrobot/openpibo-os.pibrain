<!DOCTYPE html>
<html lang="ko">
<head>
  <title>IDE for piBrain</title>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="../static/fontello.css" type="text/css" />
  <link rel="stylesheet" href="../static/index.css?ver=260320v5" />
  <link rel="stylesheet" href="../static/all.min.css" type="text/css" />
  <link rel="stylesheet" href="../static/codemirror.css" />
  <link rel="stylesheet" href="../static/cobalt.css" />
  <link rel="stylesheet" href="../static/duotone-light.css" />
  <link rel="stylesheet" href="../static/jquery.jsonview.min.css" />
  <link rel="shortcut icon" href="../static/icon.png?ver=240319v1" type="image/x-icon" />

  <script src="../static/ko2en.js?ver=240319v4"></script>
  <script src="../static/blockly_compressed.js?ver=240319v1"></script>
  <script src="../static/blocks_compressed.js?ver=240319v1"></script>
  <script src="../static/python_compressed.js?ver=240319v1"></script>
  <script src="../static/customblock.js?ver=240319v34"></script>
  <script src="../static/customblock_callback.js?ver=240319v34"></script>
  <script src="../static/customblock_toolbox.js?ver=240319v34"></script>
  <script src="../static/jquery-3.1.1.min.js"></script>
  <script src="../static/field-bitmap.js"></script>
  <script src="../static/jquery.jsonview.min.js"></script>
  <script src="../static/codemirror.min.js"></script>
  <script src="../static/comment.js"></script>
  <script src="../static/python.js"></script>
  <script src="../static/disable-top-blocks.js"></script>
  <script src="../static/socket.io.min.js?ver=240319v3"></script>
</head>

<body>
  <!-- ====== HEADER ====== -->
  <header class="title">
    <div class="header-left">
      <button class="sidebar-toggle-btn" id="sidebar_toggle_btn" title="Toggle file panel">
        <i class="fa-solid fa-bars"></i>
      </button>
      <h2 class="header-logo">
        <i class="fa-solid fa-code"></i> IDE
      </h2>
    </div>
    <div class="header-right">
      <h2>
        <a id="fullscreen_bt" title="Full Screen"><span id="fullscreen_txt"></span></a>
        <a id="restore_bt" title="Restore"><i class="fa-solid fa-eraser"></i></a>
        <select id="language" aria-label="language">
          <option value="ko">한국어</option>
          <option value="en">English</option>
        </select>
        <a id="logo_bt">
          <img src="../static/themaker.png" style="height:20px" alt="" />
        </a>
      </h2>
    </div>
  </header>

  <!-- ====== POPUPS ====== -->
  <div class="alert-popup" id="alertPopup" style="display:none;">
    <div class="alert-popup-content">
      <p id="alertMessageElement"></p>
      <div class="popup-buttons">
        <button id="alertOkBtn"><span data-key="confirm"></span></button>
      </div>
    </div>
  </div>

  <div class="prompt-popup" id="promptPopup" style="display:none;">
    <div class="prompt-popup-content">
      <p id="promptMessageElement"></p>
      <input type="text" id="promptInputElement" />
      <div class="popup-buttons">
        <button id="promptOkBtn"><span data-key="confirm"></span></button>
        <button id="promptCancelBtn"><span data-key="cancel"></span></button>
      </div>
    </div>
  </div>

  <div class="confirm-popup" id="confirmPopup" style="display:none;">
    <div class="confirm-popup-content">
      <p id="confirmMessageElement"></p>
      <div class="popup-buttons">
        <button id="confirmOkBtn"><span data-key="confirm"></span></button>
        <button id="confirmCancelBtn"><span data-key="cancel"></span></button>
      </div>
    </div>
  </div>

  <!-- ====== MAIN LAYOUT ====== -->
  <main>

    <!-- LEFT: File Sidebar -->
    <aside class="sidebar" id="browser_en">
      <div class="sidebar-inner">
        <div class="sidebar-actions">
          <label for="upload" class="sidebar-btn sidebar-btn-teal" title="Upload file">
            <i class="fa-solid fa-file-upload"></i>
            <span data-key="upload">업로드</span>
          </label>
          <div class="filebox">
            <form method="post" action="/upload" enctype="multipart/form-data">
              <input type="file" id="upload" multiple>
            </form>
          </div>
          <button id="add_directory" class="sidebar-btn" style="background-color:#dcb9b2" title="New folder">
            <i class="fa-solid fa-folder-plus"></i>
            <span data-key="add_directory">새 폴더</span>
          </button>
          <button id="add_file" class="sidebar-btn" title="New file">
            <i class="fa-solid fa-file-circle-plus"></i>
            <span data-key="add_file">새 파일</span>
          </button>
        </div>
        <div class="sidebar-path">
          <i class="fa-solid fa-folder-open"></i>
          <span id="path" class="path-text"></span>
        </div>
        <div class="fm-table-wrap" id="drop_zone">
          <table id="fm_table"><tbody></tbody></table>
          <div class="drop-overlay" id="drop_overlay">
            <i class="fa-solid fa-cloud-arrow-up fa-2x"></i>
            <span>Drop to upload</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- MIDDLE: Editor -->
    <section class="editor-pane">
      <div class="editor-toolbar">
        <div class="toolbar-group toolbar-left">
          <div class="codetype-switch" name="codetype">
            <button name="block">
              <i class="fa-solid fa-cube"></i>
              <span data-key="block"></span>
            </button>
            <button name="python">
              <i class="fa-brands fa-python"></i>
              <span data-key="python"></span>
            </button>
          </div>
          <span id="codecheck" class="unsaved-dot" title="Unsaved changes"></span>
        </div>
        <div class="toolbar-group toolbar-right">
          <label class="toolbar-label" title="Font size">
            <i class="fa-solid fa-text-height"></i>
            <input type="number" id="fontsize" min="5" max="50" value="14" step="1" pattern="\d*" aria-label="fontsize" />
          </label>
          <button id="execute" class="btn-teal">
            <i class="fa-solid fa-flag fa-lg"></i>&nbsp;<span data-key="execute"></span>
          </button>
          <button id="stop" class="btn-red disabled">
            <i class="fa-solid fa-circle fa-lg"></i>&nbsp;<span data-key="stop"></span>
          </button>
          <button id="save" class="btn">
            <i class="fa-solid fa-save fa-lg"></i>&nbsp;<span data-key="save"></span>
          </button>
          <label class="toolbar-toggle" title="Toggle theme">
            <i class="fa-solid fa-circle-half-stroke fa-lg"></i>
            <input type="checkbox" id="theme_check" name="theme_check" checked aria-label="theme_check" />
          </label>
        </div>
      </div>
      <div class="editor-filepath">
        <i class="fa-solid fa-file"></i>
        <span id="codepath"></span>
      </div>
      <div class="editor-body">
        <div id="blocklyDiv" class="blocklyDiv"></div>
        <div id="codeDiv">
          <form id="code_form">
            <textarea id="codemirror-code" name="source_code" aria-label="source_code"></textarea>
          </form>
        </div>
      </div>
    </section>

    <!-- RESIZER -->
    <div class="pane-resizer" id="pane_resizer" title="Drag to resize"></div>

    <!-- RIGHT: Result -->
    <aside class="result-pane" id="result_en">
      <div class="result-toolbar">
        <button id="eraser">
          <i class="fa-solid fa-eraser fa-lg"></i>&nbsp;<span data-key="reset"></span>
        </button>
        <div class="stdin-wrap">
          <i class="fas fa-keyboard"></i>
          <input type="text" id="prompt" name="prompt" aria-label="prompt" placeholder="stdin…" />
          <button id="prompt_bt">
            <i class="fa-solid fa-arrow-left fa-lg"></i>&nbsp;<span data-key="enter"></span>
          </button>
        </div>
        <button id="viewer_toggle_btn" title="미디어 뷰어 열기/닫기" class="btn-teal">
          <i class="fa-solid fa-display"></i>
        </button>
      </div>
      <div class="editor-filepath">
        <i class="fa-solid fa-file"></i>
        <span id="respath"></span>
      </div>
      <div id="media_viewer" style="display:none;">
        <div id="media_viewer_inner">
          <div class="media-viewer-path">
            <i class="fa-solid fa-file"></i>
            <span id="mediapath"></span>
          </div>
          <img id="image" class="preview-img" alt="" />
          <audio controls id="audio" class="preview-audio"></audio>
        </div>
      </div>
      <textarea id="result" class="result" disabled aria-label="result"></textarea>
    </aside>

  </main>

  <!-- ====== MOBILE TAB BAR ====== -->
  <nav class="mobile-tabbar" id="mobile_tabbar">
    <button class="mobile-tab" id="tab_files" title="Files">
      <i class="fa-solid fa-folder-open"></i>
      <span>파일</span>
    </button>
    <button class="mobile-tab active" id="tab_editor" title="Editor">
      <i class="fa-solid fa-code"></i>
      <span>에디터</span>
    </button>
    <button class="mobile-tab" id="tab_result" title="Result">
      <i class="fa-solid fa-terminal"></i>
      <span>결과</span>
    </button>
  </nav>

  <script src="../static/index.js?ver=260320v2"></script>
  <script src="../static/ide_extra.js?ver=260320v1"></script>
</body>
</html>
